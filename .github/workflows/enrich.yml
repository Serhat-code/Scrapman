name: Enrichissement (à la demande)

# Enrichit les prospects `pending` : site web (via navigateur Playwright),
# SIRENE, email du dirigeant, scoring. Volontairement lent (1 requête/s) :
# on visite de vrais sites de petites entreprises, pas une API publique —
# pas question de les solliciter en rafale. Déclenché automatiquement par
# scrape.yml juste après une collecte (voir son dernier step), ou
# manuellement via workflow_dispatch.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Nombre maximum de prospects à enrichir"
        required: false
        default: "50"
      user_id:
        description: "UUID de l'utilisateur déclencheur"
        required: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: scraper
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SMTP_ENCRYPTION_KEY: ${{ secrets.SMTP_ENCRYPTION_KEY }}
      VILLE_PROSPECTEUR: "Saint-Étienne"
      CALENDLY_URL: "calendly.com/atlamazstudio/30min"
      # Optionnelle : audit_site reste null et l'enrichissement continue
      # normalement si ce secret n'est pas configuré (voir audit/pagespeed.py).
      GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
      ENRICH_LIMIT: ${{ github.event.inputs.limit || '50' }}
      USER_ID: ${{ github.event.inputs.user_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Installer Chromium (Playwright)
        run: playwright install --with-deps chromium

      - name: Lancer l'enrichissement
        run: python main.py enrich --limit "$ENRICH_LIMIT" --user-id "$USER_ID"
